<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 설문</title>
<style>
body{font-family:"Noto Sans KR",sans-serif;text-align:center;margin:0;padding:20px;background:#fffdf7;}
h1{color:#ff6f00;font-size:2.5em;margin-bottom:20px;}
.groupBtn{font-size:1.2em;padding:10px 20px;margin:10px;border:none;border-radius:10px;cursor:pointer;background:#ffd54f;}
.groupBtn:hover{background:#ffca28;}
.question{display:none;font-size:2em;font-weight:bold;margin:60px 0;}
.answers{margin-top:30px;display:flex;justify-content:center;}
.answers button{width:150px;height:150px;margin:15px;border:none;border-radius:50%;font-size:2em;color:white;cursor:pointer;}
.green{background:#81c784;}
.yellow{background:#fff176;color:#333;}
.red{background:#e57373;}
#overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.95);z-index:9999;display:flex;align-items:center;justify-content:center;font-size:2.5em;color:#333;font-weight:bold;}
</style>
</head>
<body>

<h1>안전체험교육 설문</h1>

<div id="groupButtons">
  <p>나는 어떤 친구일까요?</p>
  <button class="groupBtn" onclick="selectGroup('유아')">유치원 / 어린이집</button>
  <button class="groupBtn" onclick="selectGroup('초등')">초등학교 저학년</button>
</div>

<div class="question" id="survey">
  안전체험교육을 통해<br>위험한 상황에서 어떻게 행동해야 하는지<br>잘 알게 되었나요?
  <div class="answers">
    <button class="green" onclick="submitAnswer('O')">O</button>
    <button class="yellow" onclick="submitAnswer('△')">△</button>
    <button class="red" onclick="submitAnswer('X')">X</button>
  </div>
</div>

<div id="overlay">응답 감사합니다!</div>

<script>
const sheetURL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";
let lock = false;
let selectedGroup = "";

function selectGroup(group){
  selectedGroup = group;
  document.getElementById("groupButtons").style.display = "none";
  document.getElementById("survey").style.display = "block";
  // 버튼 항상 표시
  document.querySelector(".answers").style.display = "flex";
  document.getElementById("overlay").style.display = "none";
}

function submitAnswer(answer){
  if(lock) return;
  lock = true;

  // 버튼 숨기고 감사 화면 표시
  document.querySelector(".answers").style.display = "none";
  document.getElementById("overlay").style.display = "flex";

  // 서버 전송 (비동기)
  fetch(sheetURL,{
    method:"POST",
    body:JSON.stringify({group:selectedGroup, answer:answer})
  }).catch(console.error);

  // 1초 후 초기 화면으로 전환
  setTimeout(()=>{
    document.getElementById("overlay").style.display = "none";
    document.getElementById("survey").style.display = "none";
    document.getElementById("groupButtons").style.display = "block";
    lock = false;
  },1000);
}
</script>

</body>
</html>
