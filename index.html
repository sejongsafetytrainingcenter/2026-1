<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>
body{
font-family:"Noto Sans KR",sans-serif;
background:linear-gradient(180deg,#fffdf7,#fff3cd);
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff6f00;
font-size:48px;
margin-bottom:20px;
}

#statsBtn{
font-size:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#64b5f6;
color:white;
cursor:pointer;
margin-bottom:30px;
}

#groupTitle{
font-size:42px;
margin-bottom:30px;
font-weight:bold;
}

.groupBtn{
font-size:34px;
padding:30px 50px;
margin:25px;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition: transform 0.1s;
}

.groupBtn:hover{
transform: scale(1.05);
}

.kindergarten{
background:#ffd54f;
color:black;
}

.elementary{
background:#4caf50;
color:black;
}

.question{
font-size:46px;
margin-top:60px;
line-height:1.4;
font-weight:bold;
}

.answers{
margin-top:70px;
}

.answers button{
width:200px;
height:200px;
font-size:70px;
border-radius:50%;
border:none;
margin:35px;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition: transform 0.1s;
}

.answers button:hover{
transform: scale(1.1);
}

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
display:none;
z-index:999;
}

#statsBox{
display:none;
margin-top:40px;
}

.statsGroup{
display:flex;
justify-content:center;
align-items:center;
margin:20px 0;
flex-wrap:wrap;
}

.statsGroup .statBtn{
width:120px;
height:120px;
border-radius:50%;
border:none;
margin:10px;
font-size:36px;
color:white;
cursor:default;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.statTitle{
font-size:22px;
margin-bottom:5px;
font-weight:bold;
}

.statValue{
font-size:28px;
font-weight:bold;
}

.statO{background:#66bb6a;}
.statD{background:#ffee58;color:black;}
.statX{background:#ef5350;}

.sectionTitle{
font-size:36px;
margin-top:40px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<button id="statsBtn">📊 관리자 통계</button>

<div id="group">

<div id="groupTitle">
나는 어떤 친구일까요?
</div>

<button class="groupBtn kindergarten" data-group="유아">
유치원 / 어린이집
</button>

<button class="groupBtn elementary" data-group="초등">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">
교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?
</div>

<div class="answers">
<button class="green" data-answer="O">O</button>
<button class="yellow" data-answer="△">△</button>
<button class="red" data-answer="X">X</button>
</div>

</div>

<div id="statsBox">

<div class="sectionTitle">📅 오늘 응답</div>
<div id="todayStats" class="statsGroup"></div>

<div class="sectionTitle">📆 이번달 응답</div>
<div id="monthStats" class="statsGroup"></div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbyQN6TFE-hy5vXfA5swgboET8HRrf-ZpiWomqIIGuHoO4Yh7UYHAIntB3Ok-Zo4YX_f/exec";

let group = "";
let lock = false;

document.addEventListener("DOMContentLoaded", function(){

  // 그룹 버튼 클릭
  document.querySelectorAll(".groupBtn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
          group = btn.dataset.group;
          document.getElementById("group").style.display="none";
          document.getElementById("survey").style.display="block";
      });
  });

  // 답변 버튼 클릭
  document.querySelectorAll(".answers button").forEach(btn=>{
      btn.addEventListener("click", ()=>{
          if(lock) return;
          lock=true;
          document.querySelector(".answers").style.display="none";
          document.getElementById("thanks").style.display="flex";

          fetch(sheetURL,{
              method:"POST",
              body:JSON.stringify({
                  group:group,
                  answer:btn.dataset.answer
              })
          });

          setTimeout(()=>{ location.reload(); },1500);
      });
  });

  // 관리자 통계
  document.getElementById("statsBtn").addEventListener("click", ()=>{
      const pwd = prompt("관리자 비밀번호 입력");
      if(pwd !== "0705"){ alert("비밀번호 틀림"); return; }

      fetch(sheetURL)
      .then(res=>res.json())
      .then(data=>{
          const today = new Date().toISOString().slice(0,10);
          const month = today.slice(0,7);

          let stats = {
              today:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}},
              month:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}}
          };

          data.slice(1).forEach(row=>{
              const date=row[0], g=row[1], ans=row[2];
              if(date===today) stats.today[g][ans]++;
              if(date.startsWith(month)) stats.month[g][ans]++;
          });

          // 버튼 형태로 표시 함수
          function renderStats(containerId, statsObj){
              const container = document.getElementById(containerId);
              container.innerHTML="";
              ["유아","초등"].forEach(g=>{
                  ["O","△","X"].forEach(a=>{
                      const btn = document.createElement("button");
                      btn.className = "statBtn "+(a==="O"?"statO":a==="△"?"statD":"statX");
                      btn.innerHTML = `<div class="statTitle">${g} ${a}</div><div class="statValue">${statsObj[g][a]}</div>`;
                      container.appendChild(btn);
                  });
              });
          }

          renderStats("todayStats", stats.today);
          renderStats("monthStats", stats.month);
          document.getElementById("statsBox").style.display="block";
      });
  });

});
</script>

</body>
</html>
