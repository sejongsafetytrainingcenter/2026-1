<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>

body{
font-family:"Noto Sans KR",sans-serif;
background:linear-gradient(135deg,#fff7cc,#fffdf7);
text-align:center;
padding:40px;
margin:0;
}

/* 제목 */

h1{
color:#ff6f00;
font-size:60px;
margin-bottom:40px;
}

/* 그룹 질문 */

#group h2{
font-size:48px;
margin-bottom:40px;
color:#444;
}

/* 그룹 버튼 공통 */

#group button{
font-size:38px;
padding:30px 60px;
margin:25px;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
transition:0.2s;
color:white;
}

/* 유아 버튼 (기존색 유지) */

.kinder{
background:#ffa726;
}

/* 초등 버튼 (새 색) */

.elementary{
background:#42a5f5;
}

#group button:hover{
transform:scale(1.05);
}

/* 질문 박스 */

.question{
font-size:48px;
margin-top:60px;
line-height:1.5;
background:#fff3cd;
padding:40px;
border-radius:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:inline-block;
}

/* 답변 버튼 영역 */

.answers{
margin-top:50px;
}

/* 답변 버튼 */

.answers button{
width:240px;
height:240px;
font-size:90px;
border-radius:50%;
border:none;
margin:35px;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
transition:0.2s;
}

.answers button:hover{
transform:scale(1.1);
}

/* 버튼 색상 */

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

/* 감사 화면 */

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
font-weight:bold;
color:#333;
display:none;
z-index:9999;
}

</style>

</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<div id="group">

<h2>나는 어떤 친구일까요?</h2>

<button class="kinder" onclick="selectGroup('유아')">
유치원 / 어린이집
</button>

<button class="elementary" onclick="selectGroup('초등')">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">

교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?

</div>

<div class="answers">

<button class="green" onclick="send('O')">O</button>
<button class="yellow" onclick="send('△')">△</button>
<button class="red" onclick="send('X')">X</button>

</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbx6_QNmNP3WMFBsmvd9YFmy_rP34YGyNeLUxAX-MURDD1BZ7n-Wh0FZxaOWm94jVwvn/exec";

let group="";
let lock=false;

function selectGroup(g){

group=g;

document.getElementById("group").style.display="none";
document.getElementById("survey").style.display="block";

}

function send(answer){

if(lock) return;

lock=true;

/* 감사 화면 먼저 표시 (버튼 가리기) */

document.getElementById("thanks").style.display="flex";

/* 모든 버튼 비활성화 */

document.querySelectorAll("button").forEach(b=>b.disabled=true);

/* 구글 시트로 데이터 전송 */

fetch(sheetURL,{
method:"POST",
body:JSON.stringify({
group:group,
answer:answer
})
});

/* 1.5초 후 초기화 */

setTimeout(()=>{

location.reload();

},1500);

}

</script>

</body>
</html>
