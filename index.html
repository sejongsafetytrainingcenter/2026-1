<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>

body{
font-family:"Noto Sans KR",sans-serif;
background:#fffdf7;
text-align:center;
padding:30px;
margin:0;
}

h1{
color:#ff6f00;
font-size:40px;
}

.group button{

font-size:28px;
padding:20px 40px;
margin:20px;
border:none;
border-radius:15px;
background:#ffd54f;
cursor:pointer;

}

.question{

font-size:40px;
margin-top:50px;

}

.answers button{

width:180px;
height:180px;
font-size:60px;
border-radius:50%;
border:none;
margin:30px;
color:white;
cursor:pointer;

}

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

#thanks{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
font-weight:bold;
display:none;

}

</style>

</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<div id="group">

<h2>나는 어떤 친구일까요?</h2>

<button onclick="selectGroup('유아')">
유치원 / 어린이집
</button>

<button onclick="selectGroup('초등')">
초등학교 저학년
</button>

</div>


<div id="survey" style="display:none">

<div class="question">

교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?

</div>

<div class="answers">

<button class="green" onclick="send('O')">O</button>

<button class="yellow" onclick="send('△')">△</button>

<button class="red" onclick="send('X')">X</button>

</div>

</div>


<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbx6_QNmNP3WMFBsmvd9YFmy_rP34YGyNeLUxAX-MURDD1BZ7n-Wh0FZxaOWm94jVwvn/exec";

let group="";
let lock=false;

function selectGroup(g){

group=g;

document.getElementById("group").style.display="none";
document.getElementById("survey").style.display="block";

}

function send(answer){

if(lock) return;

lock=true;

fetch(sheetURL,{
method:"POST",
body:JSON.stringify({

group:group,
answer:answer

})

});

document.getElementById("thanks").style.display="flex";

setTimeout(()=>{

location.reload();

},1500);

}

</script>

</body>
</html>
