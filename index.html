<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>
body{
font-family:"Noto Sans KR",sans-serif;
background:linear-gradient(180deg,#fffdf7,#fff3cd);
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff6f00;
font-size:48px;
margin-bottom:20px;
}

#statsBtn{
font-size:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#64b5f6;
color:white;
cursor:pointer;
margin-bottom:30px;
}

#groupTitle{
font-size:42px;
margin-bottom:30px;
font-weight:bold;
}

.groupBtn{
font-size:34px;
padding:30px 50px;
margin:25px;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition: transform 0.1s;
}

.groupBtn:hover{
transform: scale(1.05);
}

.kindergarten{
background:#ffd54f;
color:black;
}

.elementary{
background:#4caf50;
color:black;
}

.question{
font-size:46px;
margin-top:60px;
line-height:1.4;
font-weight:bold;
}

.answers{
margin-top:70px;
}

.answers button{
width:200px;
height:200px;
font-size:70px;
border-radius:50%;
border:none;
margin:35px;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition: transform 0.1s;
}

.answers button:hover{
transform: scale(1.1);
}

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
display:none;
z-index:999;
}

#statsBox{
display:none;
margin-top:40px;
}

table{
border-collapse:collapse;
margin:30px auto;
font-size:26px;
}

th,td{
border:1px solid #999;
padding:15px 30px;
}

th{
background:#f5f5f5;
}

.sectionTitle{
font-size:36px;
margin-top:40px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<button id="statsBtn">📊 관리자 통계</button>

<div id="group">

<div id="groupTitle">
나는 어떤 친구일까요?
</div>

<button class="groupBtn kindergarten" data-group="유아">
유치원 / 어린이집
</button>

<button class="groupBtn elementary" data-group="초등">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">
교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?
</div>

<div class="answers">
<button class="green" data-answer="O">O</button>
<button class="yellow" data-answer="△">△</button>
<button class="red" data-answer="X">X</button>
</div>

</div>

<div id="statsBox">

<div class="sectionTitle">📅 오늘 응답</div>

<table>
<tr>
<th></th>
<th>O</th>
<th>△</th>
<th>X</th>
</tr>
<tr>
<th>유아</th>
<td id="todayKidO">0</td>
<td id="todayKidD">0</td>
<td id="todayKidX">0</td>
</tr>
<tr>
<th>초등</th>
<td id="todayEleO">0</td>
<td id="todayEleD">0</td>
<td id="todayEleX">0</td>
</tr>
</table>

<div class="sectionTitle">📆 이번달 응답</div>

<table>
<tr>
<th></th>
<th>O</th>
<th>△</th>
<th>X</th>
</tr>
<tr>
<th>유아</th>
<td id="monthKidO">0</td>
<td id="monthKidD">0</td>
<td id="monthKidX">0</td>
</tr>
<tr>
<th>초등</th>
<td id="monthEleO">0</td>
<td id="monthEleD">0</td>
<td id="monthEleX">0</td>
</tr>
</table>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbyQN6TFE-hy5vXfA5swgboET8HRrf-ZpiWomqIIGuHoO4Yh7UYHAIntB3Ok-Zo4YX_f/exec";

let group = "";
let lock = false;

// 그룹 버튼 클릭 처리
document.querySelectorAll(".groupBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        group = btn.dataset.group;
        document.getElementById("group").style.display="none";
        document.getElementById("survey").style.display="block";
    });
});

// 답변 버튼 클릭 처리
document.querySelectorAll(".answers button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        if(lock) return;
        lock=true;
        document.querySelector(".answers").style.display="none";
        document.getElementById("thanks").style.display="flex";

        fetch(sheetURL,{
            method:"POST",
            body:JSON.stringify({
                group:group,
                answer:btn.dataset.answer
            })
        });

        setTimeout(()=>{ location.reload(); },1500);
    });
});

// 관리자 통계
document.getElementById("statsBtn").addEventListener("click", ()=>{
    const pwd=prompt("관리자 비밀번호 입력");
    if(pwd!=="0705"){ alert("비밀번호 틀림"); return; }

    fetch(sheetURL)
    .then(res=>res.json())
    .then(data=>{
        const today=new Date().toISOString().slice(0,10);
        const month=today.slice(0,7);

        let stats={
            today:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}},
            month:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}}
        };

        data.slice(1).forEach(row=>{
            const date=row[0], g=row[1], ans=row[2];
            if(date===today) stats.today[g][ans]++;
            if(date.startsWith(month)) stats.month[g][ans]++;
        });

        document.getElementById("todayKidO").textContent=stats.today.유아.O;
        document.getElementById("todayKidD").textContent=stats.today.유아.△;
        document.getElementById("todayKidX").textContent=stats.today.유아.X;

        document.getElementById("todayEleO").textContent=stats.today.초등.O;
        document.getElementById("todayEleD").textContent=stats.today.초등.△;
        document.getElementById("todayEleX").textContent=stats.today.초등.X;

        document.getElementById("monthKidO").textContent=stats.month.유아.O;
        document.getElementById("monthKidD").textContent=stats.month.유아.△;
        document.getElementById("monthKidX").textContent=stats.month.유아.X;

        document.getElementById("monthEleO").textContent=stats.month.초등.O;
        document.getElementById("monthEleD").textContent=stats.month.초등.△;
        document.getElementById("monthEleX").textContent=stats.month.초등.X;

        document.getElementById("statsBox").style.display="block";
    });
});

</script>

</body>
</html>
