<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>

body{
font-family:"Noto Sans KR",sans-serif;
background:linear-gradient(180deg,#fffdf7,#fff3cd);
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff6f00;
font-size:48px;
margin-bottom:40px;
}

#groupTitle{
font-size:42px;
margin-bottom:30px;
font-weight:bold;
}

.groupBtn{
font-size:34px;
padding:30px 50px;
margin:25px;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.kindergarten{
background:#ffd54f;
color:black;
}

.elementary{
background:#4caf50;
color:black;
}

.question{
font-size:46px;
margin-top:60px;
line-height:1.4;
font-weight:bold;
}

.answers{
margin-top:70px;
}

.answers button{
width:200px;
height:200px;
font-size:70px;
border-radius:50%;
border:none;
margin:35px;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<div id="group">

<div id="groupTitle">
나는 어떤 친구일까요?
</div>

<button class="groupBtn kindergarten" onclick="selectGroup('유아')">
유치원 / 어린이집
</button>

<button class="groupBtn elementary" onclick="selectGroup('초등')">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">

교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?

</div>

<div class="answers">

<button class="green" onclick="send('O')">O</button>
<button class="yellow" onclick="send('△')">△</button>
<button class="red" onclick="send('X')">X</button>

</div>

</div>

<script>

/* 새 Apps Script 주소 적용 */
const sheetURL =
"https://script.google.com/macros/s/AKfycbyQN6TFE-hy5vXfA5swgboET8HRrf-ZpiWomqIIGuHoO4Yh7UYHAIntB3Ok-Zo4YX_f/exec";

let group="";
let lock=false;

function selectGroup(g){

group=g;

document.getElementById("group").style.display="none";
document.getElementById("survey").style.display="block";

}

function send(answer){

if(lock) return;

lock=true;

/* 버튼 숨김 */
document.querySelector(".answers").style.display="none";

/* 감사 화면 표시 */
document.getElementById("thanks").style.display="flex";

/* 구글 시트 전송 */

fetch(sheetURL,{
method:"POST",
body:JSON.stringify({
group:group,
answer:answer
})
});

/* 1.5초 후 초기화 */

setTimeout(()=>{

location.reload();

},1500);

}

</script>

</body>
</html>
