<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>

body{
font-family:"Noto Sans KR",sans-serif;
background:linear-gradient(180deg,#fffdf7,#fff3cd);
text-align:center;
padding:20px;
margin:0;
}

h1{
color:#ff6f00;
font-size:48px;
margin-bottom:20px;
}

#statsBtn{
font-size:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#64b5f6;
color:white;
cursor:pointer;
margin-bottom:30px;
}

#groupTitle{
font-size:42px;
margin-bottom:30px;
font-weight:bold;
}

.groupBtn{
font-size:34px;
padding:30px 50px;
margin:25px;
border:none;
border-radius:25px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.kindergarten{
background:#ffd54f;
color:black;
}

.elementary{
background:#4caf50;
color:black;
}

.question{
font-size:46px;
margin-top:60px;
line-height:1.4;
font-weight:bold;
}

.answers{
margin-top:70px;
}

.answers button{
width:200px;
height:200px;
font-size:70px;
border-radius:50%;
border:none;
margin:35px;
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
font-weight:bold;
display:none;
z-index:999;
}

#statsBox{
display:none;
margin-top:40px;
}

table{
border-collapse:collapse;
margin:auto;
font-size:22px;
}

th,td{
border:1px solid #999;
padding:10px 20px;
}

th{
background:#f2f2f2;
}

.bar{
height:30px;
background:#4caf50;
margin:5px 0;
}

</style>
</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<button id="statsBtn" onclick="showStats()">📊 관리자 통계</button>

<div id="group">

<div id="groupTitle">
나는 어떤 친구일까요?
</div>

<button class="groupBtn kindergarten" onclick="selectGroup('유아')">
유치원 / 어린이집
</button>

<button class="groupBtn elementary" onclick="selectGroup('초등')">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">

교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?

</div>

<div class="answers">

<button class="green" onclick="send('O')">O</button>
<button class="yellow" onclick="send('△')">△</button>
<button class="red" onclick="send('X')">X</button>

</div>

</div>

<div id="statsBox">

<h2>📊 관리자 통계</h2>

<table>

<tr>
<th>구분</th>
<th>응답수</th>
</tr>

<tr>
<td>오늘 응답</td>
<td id="todayCount">0</td>
</tr>

<tr>
<td>이번달 응답</td>
<td id="monthCount">0</td>
</tr>

<tr>
<td>유아</td>
<td id="kidCount">0</td>
</tr>

<tr>
<td>초등</td>
<td id="eleCount">0</td>
</tr>

</table>

<h3 style="margin-top:40px">응답 비율</h3>

<div>O</div>
<div id="barO" class="bar"></div>

<div>△</div>
<div id="barD" class="bar" style="background:#ffee58"></div>

<div>X</div>
<div id="barX" class="bar" style="background:#ef5350"></div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbyQN6TFE-hy5vXfA5swgboET8HRrf-ZpiWomqIIGuHoO4Yh7UYHAIntB3Ok-Zo4YX_f/exec";

let group="";
let lock=false;

function selectGroup(g){

group=g;

document.getElementById("group").style.display="none";
document.getElementById("survey").style.display="block";

}

function send(answer){

if(lock) return;

lock=true;

document.querySelector(".answers").style.display="none";

document.getElementById("thanks").style.display="flex";

fetch(sheetURL,{
method:"POST",
body:JSON.stringify({
group:group,
answer:answer
})
});

setTimeout(()=>{

location.reload();

},1500);

}

function showStats(){

const pwd=prompt("관리자 비밀번호 입력");

if(pwd!=="0705"){
alert("비밀번호 틀림");
return;
}

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{

const today=new Date().toISOString().slice(0,10);
const month=today.slice(0,7);

let todayCount=0;
let monthCount=0;
let kid=0;
let ele=0;

let O=0;
let D=0;
let X=0;

data.slice(1).forEach(row=>{

const date=row[0];
const group=row[1];
const answer=row[2];

if(date===today) todayCount++;

if(date.startsWith(month)) monthCount++;

if(group==="유아") kid++;

if(group==="초등") ele++;

if(answer==="O") O++;

if(answer==="△") D++;

if(answer==="X") X++;

});

document.getElementById("todayCount").textContent=todayCount;
document.getElementById("monthCount").textContent=monthCount;
document.getElementById("kidCount").textContent=kid;
document.getElementById("eleCount").textContent=ele;

const total=O+D+X||1;

document.getElementById("barO").style.width=(O/total*100)+"%";
document.getElementById("barD").style.width=(D/total*100)+"%";
document.getElementById("barX").style.width=(X/total*100)+"%";

document.getElementById("statsBox").style.display="block";

});

}

</script>

</body>
</html>
