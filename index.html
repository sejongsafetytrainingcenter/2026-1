<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>
<style>
body{font-family:"Noto Sans KR",sans-serif;text-align:center;padding:20px;margin:0;background:#fff;}
h1{color:#ff6f00;font-size:48px;margin-bottom:20px;}
button{cursor:pointer;}
.groupBtn{font-size:32px;padding:20px 40px;margin:20px;border-radius:20px;border:none;}
.greenBtn{background:#66bb6a;color:white;}
.yellowBtn{background:#ffee58;color:black;}
.redBtn{background:#ef5350;color:white;}
#statsBtn{margin-bottom:30px;font-size:20px;padding:10px 20px;background:#64b5f6;color:white;border:none;border-radius:10px;}
#survey,#statsBox,#thanks{display:none;}
#thanks{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;justify-content:center;align-items:center;font-size:60px;font-weight:bold;z-index:999;}
.statBtn{width:120px;height:120px;border-radius:50%;border:none;margin:10px;font-size:36px;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 6px 15px rgba(0,0,0,0.2);}
.statO{background:#66bb6a;}
.statD{background:#ffee58;color:black;}
.statX{background:#ef5350;}
.statsGroup{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;margin:20px 0;}
.statTitle{font-size:22px;margin-bottom:5px;font-weight:bold;}
.statValue{font-size:28px;font-weight:bold;}
.sectionTitle{font-size:36px;margin-top:40px;font-weight:bold;}
</style>
</head>
<body>

<div id="thanks">응답 감사합니다!</div>

<h1>안전체험교육 만족도 조사</h1>

<button id="statsBtn">📊 관리자 통계</button>

<div id="group">
  <div id="groupTitle">나는 어떤 친구일까요?</div>
  <button class="groupBtn" data-group="유아">유치원 / 어린이집</button>
  <button class="groupBtn" data-group="초등">초등학교 저학년</button>
</div>

<div id="survey">
  <div class="question">교육을 통해 위험한 상황에서<br>어떻게 행동해야 하는지<br>잘 알게 되었나요?</div>
  <div class="answers">
    <button class="greenBtn" data-answer="O">O</button>
    <button class="yellowBtn" data-answer="△">△</button>
    <button class="redBtn" data-answer="X">X</button>
  </div>
</div>

<div id="statsBox">
  <div class="sectionTitle">📅 오늘 응답</div>
  <div id="todayStats" class="statsGroup"></div>
  <div class="sectionTitle">📆 이번달 응답</div>
  <div id="monthStats" class="statsGroup"></div>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbyQN6TFE-hy5vXfA5swgboET8HRrf-ZpiWomqIIGuHoO4Yh7UYHAIntB3Ok-Zo4YX_f/exec";
let group="";
let lock=false;

document.addEventListener("DOMContentLoaded",()=>{
  // 그룹 선택
  document.querySelectorAll(".groupBtn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      group=btn.dataset.group;
      document.getElementById("group").style.display="none";
      document.getElementById("survey").style.display="block";
    });
  });

  // 답변 제출
  document.querySelectorAll(".answers button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(lock) return;
      lock=true;
      document.getElementById("survey").style.display="none";
      document.getElementById("thanks").style.display="flex";

      fetch(sheetURL,{
        method:"POST",
        body:JSON.stringify({group:group, answer:btn.dataset.answer})
      }).catch(err=>console.error(err));

      setTimeout(()=>{ location.reload(); },1500);
    });
  });

  // 관리자 통계
  document.getElementById("statsBtn").addEventListener("click", async ()=>{
    const pwd = prompt("관리자 비밀번호 입력");
    if(pwd!=="0705"){ alert("비밀번호 틀림"); return; }

    try {
      const res = await fetch(sheetURL);
      const data = await res.json();
      const today = new Date().toISOString().slice(0,10);
      const month = today.slice(0,7);
      let stats={
        today:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}},
        month:{유아:{O:0,△:0,X:0}, 초등:{O:0,△:0,X:0}}
      };

      data.slice(1).forEach(row=>{
        const date=row[0], g=row[1], ans=row[2];
        if(date===today) stats.today[g][ans]++;
        if(date.startsWith(month)) stats.month[g][ans]++;
      });

      function render(containerId, statsObj){
        const container = document.getElementById(containerId);
        container.innerHTML="";
        ["유아","초등"].forEach(g=>{
          ["O","△","X"].forEach(a=>{
            const btn=document.createElement("button");
            btn.className="statBtn "+(a==="O"?"statO":a==="△"?"statD":"statX");
            btn.innerHTML=`<div class="statTitle">${g} ${a}</div><div class="statValue">${statsObj[g][a]}</div>`;
            container.appendChild(btn);
          });
        });
      }

      render("todayStats", stats.today);
      render("monthStats", stats.month);
      document.getElementById("statsBox").style.display="block";

    } catch(e){
      alert("통계 불러오기 실패");
      console.error(e);
    }
  });
});
</script>

</body>
</html>
