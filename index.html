<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세종시안전체험교육원 설문</title>
  <style>
    body { font-family: "Noto Sans KR", sans-serif; background: #fffdf7; margin: 0; padding: 20px; text-align: center; }
    header img { width: 100px; margin-bottom: 10px; }
    h1 { color: #ff6f00; font-size: 2em; }
    .date { margin-bottom: 20px; font-size: 1.2em; color: #555; }
    .group-select button { font-size: 1.2em; padding: 10px 20px; margin: 8px; border-radius: 10px; border: none; background-color: #ffd54f; cursor: pointer; transition: background-color 0.3s; }
    .group-select button:hover { background-color: #ffca28; }
    .question { font-size: 2.5em; font-weight: bold; margin: 80px 0 10px; color: #444; background-color: #fbc02d; padding: 20px; border-radius: 15px; box-shadow: 0px 5px 15px rgba(0,0,0,0.1); display: inline-block; }
    .answer-buttons { margin-top: 40px; }
    .answer-buttons button { width: 180px; height: 180px; margin: 20px; border: none; border-radius: 50%; font-size: 2em; font-weight: bold; color: white; cursor: pointer; box-shadow: 4px 4px 15px rgba(0,0,0,0.2); transition: transform 0.3s; }
    .answer-buttons button:hover { transform: scale(1.1); }
    .green { background-color: #81c784; }
    .yellow { background-color: #fff176; color: #333; }
    .red { background-color: #e57373; }
    .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 3em; color: #333; font-weight: bold; display: none; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">응답이 완료되었습니다</div>
  <header>
    <img src="logo_placeholder.png" alt="세종시안전체험교육원 로고">
    <h1>안전체험교육 설문조사</h1>
    <div class="date">오늘: <span id="date"></span></div>
  </header>

  <div class="group-select" id="groupButtons">
    <p style="font-size:1.2em; margin-bottom: 10px;">나는 어떤 친구일까요?</p>
    <button onclick="selectGroup('유아')">유치원 / 어린이집</button>
    <button onclick="selectGroup('초등')">초등학교 저학년</button>
  </div>

  <div class="question" id="questionSection" style="display:none;">
    안전체험교육을 통해<br><strong>위험한 상황에서 어떻게 행동해야 하는지</strong><br>잘 알게 되었나요?
    <div class="answer-buttons">
      <button class="green" onclick="submitAnswer('O')">O</button>
      <button class="yellow" onclick="submitAnswer('△')">△</button>
      <button class="red" onclick="submitAnswer('X')">X</button>
    </div>
    <button onclick="cancelAnswer()" style="margin-top:20px; font-size:1em; padding:8px 16px;">응답 취소</button>
  </div>

  <script>
    const sheetURL = "https://script.google.com/macros/s/AKfycbxLQiSZknQ8e6F1cq9SNWvHy1uR3kZdroGxTt4I5f_A4yPHZ4sRbXCzCFDQpq4ST69J/exec";

    const now = new Date();
    const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
    const today = kst.toISOString().slice(0,10);
    document.getElementById("date").textContent = today;

    let selectedGroup = "";
    let lastAnswer = null;

    function selectGroup(group) {
      selectedGroup = group;
      document.getElementById("questionSection").style.display = "block";
      document.getElementById("groupButtons").style.display = "none";
    }

    function showOverlay() {
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex";
      setTimeout(() => { overlay.style.display = "none"; }, 1000);
    }

    function submitAnswer(answer) {
      if (!selectedGroup) { alert("먼저 어떤 친구인지 선택해주세요!"); return; }

      const timestamp = new Date().toISOString();
      showOverlay();

      fetch(sheetURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          date: today,
          group: selectedGroup,
          answer: answer
        })
      })
      .then(response => response.text())
      .then(msg => {
        console.log(msg);
        lastAnswer = { answer, timestamp };
      })
      .catch(console.error);
    }

    function cancelAnswer() {
      if (!lastAnswer) { alert("취소할 응답이 없습니다!"); return; }

      fetch(sheetURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mode: "delete",
          date: today,
          group: selectedGroup,
          answer: lastAnswer.answer
        })
      })
      .then(response => response.text())
      .then(msg => {
        console.log(msg);
        lastAnswer = null;
      })
      .catch(console.error);
    }
  </script>
</body>
</html>
