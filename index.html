<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>만족도 조사 - 안정판</title>
<style>
body{font-family:"Noto Sans KR",sans-serif;text-align:center;padding:20px;margin:0;background:#fffdf7;}
h1{color:#ff6f00;font-size:48px;margin-bottom:20px;}
button{font-size:28px;padding:20px 40px;margin:20px;border:none;border-radius:20px;cursor:pointer;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
#thanks{display:none;font-size:32px;color:#4caf50;margin-top:50px;}
</style>
</head>
<body>

<h1>안전체험교육 만족도 조사</h1>

<div id="group">
<p>나는 어떤 친구일까요?</p>
<button onclick="selectGroup('유아')">유치원 / 어린이집</button>
<button onclick="selectGroup('초등')">초등학교 저학년</button>
</div>

<div id="survey" style="display:none">
<p>교육을 통해 위험한 상황에서 어떻게 행동해야 하는지 잘 알게 되었나요?</p>
<button onclick="send('O')">O</button>
<button onclick="send('△')">△</button>
<button onclick="send('X')">X</button>
</div>

<div id="thanks">응답 감사합니다!</div>

<script>
// ✅ 웹앱 URL (최신)
const sheetURL = "https://script.google.com/macros/s/AKfycbws0hl9hMvYQnfh6y2pPI-S5XXMPYB3n0YzXG1Te3yHANiFVa9rL7oiqKwFQMEC1QKd/exec";

let group="";

function selectGroup(g){
  group = g;
  document.getElementById("group").style.display="none";
  document.getElementById("survey").style.display="block";
}

function send(answer){
  document.getElementById("survey").style.display="none";
  document.getElementById("thanks").style.display="block";

  // 🚀 핵심: Content-Type + 날짜 포함
  fetch(sheetURL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      date: new Date().toISOString().slice(0,10), // YYYY-MM-DD
      group: group,
      answer: answer
    })
  });
}
</script>

</body>
</html>
