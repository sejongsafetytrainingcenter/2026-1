<style>
  /* 전체 배경과 폰트 */
  body {
    font-family: "Comic Sans MS", "Noto Sans KR", sans-serif;
    background: #fff8f0; /* 부드러운 아이보리 */
    margin: 0;
    padding: 20px;
    text-align: center;
  }

  header img {
    width: 120px;
    margin-bottom: 10px;
    border-radius: 50%; /* 귀엽게 동그랗게 */
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  }

  h1 {
    color: #ff8a65; /* 부드러운 주황 */
    font-size: 2.4em;
    text-shadow: 1px 1px 2px #fff3e0;
  }

  .date {
    margin-bottom: 20px;
    font-size: 1.4em;
    color: #7b7b7b;
  }

  /* 그룹 선택 버튼 */
  .group-select button {
    font-size: 1.3em;
    padding: 12px 24px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    background-color: #ffd180;
    cursor: pointer;
    transition: transform 0.3s, background-color 0.3s;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
  }

  .group-select button:hover {
    transform: scale(1.1);
    background-color: #ffb74d;
  }

  /* 질문 박스 */
  .question {
    font-size: 2em;
    font-weight: bold;
    margin: 60px 0 20px;
    color: #555;
    background-color: #ffe0b2;
    padding: 25px 20px;
    border-radius: 25px;
    box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
    display: inline-block;
    line-height: 1.5em;
  }

  /* 답변 버튼 */
  .answer-buttons button {
    width: 160px;
    height: 160px;
    margin: 20px;
    border: none;
    border-radius: 50%;
    font-size: 2.2em;
    font-weight: bold;
    color: white;
    cursor: pointer;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
  }

  .answer-buttons button:hover {
    transform: scale(1.15) rotate(-5deg);
    box-shadow: 6px 6px 20px rgba(0,0,0,0.3);
  }

  .green { background-color: #81c784; }
  .yellow { background-color: #fff176; color: #333; }
  .red { background-color: #e57373; }

  /* 통계 테이블 */
  table {
    border-collapse: collapse;
    margin: 20px auto;
    font-size: 1.1em;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  th {
    background-color: #ffd54f;
    color: #444;
    padding: 12px;
  }

  td {
    padding: 10px;
    background-color: #fff3e0;
  }

  .hide-stats-btn, .cancel-btn {
    margin-top: 20px;
    font-size: 1em;
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    border-radius: 20px;
    color: white;
    background-color: #64b5f6;
    transition: transform 0.3s;
  }

  .hide-stats-btn:hover, .cancel-btn:hover {
    transform: scale(1.1);
  }

  /* 오버레이 */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 255, 255, 0.95);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5em;
    color: #ff7043;
    font-weight: bold;
    border-radius: 20px;
    display: none;
    animation: fadeIn 0.3s ease-in-out;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }
</style>
