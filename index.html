<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>친구 유형 테스트</title>

<style>

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#e0f2fe,#f0f9ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  text-align:center;
  width:350px;
}

.title{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:30px;
}

.button-group{
  display:flex;
  flex-direction:column;
  gap:15px;
}

button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.circle{
  background:#a5f3fc;
}

.triangle{
  background:#fde68a;
}

.cross{
  background:#fecaca;
}

button:hover{
  transform:scale(1.05);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

#result{
  margin-top:20px;
  font-weight:bold;
  color:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
나는 어떤 친구일까요?
</div>

<div class="subtitle">
가장 가깝다고 생각하는 유형을 눌러주세요
</div>

<div class="button-group">

<button class="circle" onclick="sendResponse('circle',this)">
⭕ 동그라미 친구
</button>

<button class="triangle" onclick="sendResponse('triangle',this)">
🔺 세모 친구
</button>

<button class="cross" onclick="sendResponse('cross',this)">
❌ 엑스 친구
</button>

</div>

<div id="result"></div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbx6_QNmNP3WMFBsmvd9YFmy_rP34YGyNeLUxAX-MURDD1BZ7n-Wh0FZxaOWm94jVwvn/exec";

function sendResponse(type,btn){

document.querySelectorAll("button").forEach(b => b.disabled=true);

document.getElementById("result").innerText="응답 저장 중...";

fetch(url+"?type="+type)
.then(res=>res.text())
.then(data=>{
document.getElementById("result").innerText="응답해주셔서 감사합니다 😊";
})
.catch(err=>{
document.getElementById("result").innerText="오류가 발생했습니다.";
});

}

</script>

</body>
</html>
