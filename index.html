<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 어린이 설문</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<style>
body { font-family: "Comic Neue", "Noto Sans KR", sans-serif; background: #fff8e7; margin:0; padding:20px; text-align:center; }
header img { width:120px; margin-bottom:10px; }
h1 { color:#ff9800; font-size:2.2em; text-shadow: 2px 2px #ffe0b2; }
.date { margin-bottom:20px; font-size:1.2em; color:#555; }
.group-select button {
  font-size:1.4em; padding:15px 25px; margin:10px;
  border-radius:15px; border:none; background-color:#ffd54f; cursor:pointer;
  transition: transform 0.3s, background-color 0.3s;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
}
.group-select button:hover { background-color:#ffca28; transform: scale(1.1); }

.question {
  font-size:1.8em; font-weight:bold; margin:50px 0 20px;
  color:#444; background-color:#ffecb3; padding:25px; border-radius:20px;
  box-shadow: 4px 4px 12px rgba(0,0,0,0.2); display:inline-block;
  transition: transform 0.3s;
}
.question.show { transform: scale(1.03); }

.answer-buttons { margin-top:40px; }
.answer-buttons button {
  width:160px; height:160px; margin:15px; border:none; border-radius:50%;
  font-size:2em; font-weight:bold; color:white; cursor:pointer;
  box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.answer-buttons button:hover { transform: scale(1.1); box-shadow: 6px 6px 12px rgba(0,0,0,0.4); }

.green { background-color:#4caf50; }
.yellow { background-color:#ffeb3b; color:#333; }
.red { background-color:#f44336; }

.overlay {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background: rgba(255,255,255,0.95); z-index:9999; display:flex;
  align-items:center; justify-content:center; font-size:3em; color:#ff9800;
  font-weight:bold; display:none; animation: pop 0.5s ease-out;
}
@keyframes pop { 0% { transform: scale(0.5); opacity:0; } 100% { transform: scale(1); opacity:1; } }

.stats { margin-top:40px; display:none; }
table { border-collapse: collapse; margin:20px auto; }
table, th, td { border:1px solid #aaa; padding:8px 12px; }
th { background-color:#fff3e0; }

.hide-stats-btn, .cancel-btn {
  margin-top:20px; font-size:1em; padding:10px 18px; cursor:pointer;
  border:none; border-radius:12px; color:white; background-color:#64b5f6;
  box-shadow:2px 2px 8px rgba(0,0,0,0.2); transition: transform 0.3s;
}
.hide-stats-btn:hover, .cancel-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div class="overlay" id="overlay">응답이 완료되었습니다!</div>

<header>
  <img src="logo_placeholder.png" alt="세종시안전체험교육원 로고">
  <h1>안전체험교육 설문조사</h1>
  <div class="date">오늘: <span id="date"></span></div>
</header>

<div class="group-select" id="groupButtons">
  <p>나는 어떤 친구일까요?</p>
  <button onclick="selectGroup('유아')">유치원 / 어린이집</button>
  <button onclick="selectGroup('초등')">초등학교 저학년</button>
</div>

<div class="question" id="questionSection" style="display:none;">
  <div id="questionText"></div>
  <div class="answer-buttons">
    <button class="green" onclick="submitAnswer('O')">O</button>
    <button class="yellow" onclick="submitAnswer('△')">△</button>
    <button class="red" onclick="submitAnswer('X')">X</button>
  </div>
  <button class="cancel-btn" onclick="cancelAnswer()">응답 취소</button>
</div>

<button class="hide-stats-btn" onclick="requestPassword()">통계 보기</button>

<div class="stats" id="statsTable">
  <h2>통계 - <span id="selectedGroup"></span></h2>
  <div id="statsContent"></div>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbxLQiSZknQ8e6F1cq9SNWvHy1uR3kZdroGxTt4I5f_A4yPHZ4sRbXCzCFDQpq4ST69J/exec";
const now = new Date();
const kst = new Date(now.getTime() + 9*60*60*1000);
const today = kst.toISOString().slice(0,10);
document.getElementById("date").textContent = today;

const questions = [
  "안전체험교육을 통해<br><strong>위험한 상황에서 어떻게 행동해야 하는지</strong><br>잘 알게 되었나요?",
  "교육 전과 비교해<br><strong>안전 행동 이해가 향상되었나요</strong>?",
  "다음 교육에 참여하고 싶나요?"
];

let selectedGroup = "";
let lastAnswer = null;
let currentQuestion = 0;

function selectGroup(group){
  selectedGroup = group;
  document.getElementById("selectedGroup").textContent = group;
  document.getElementById("groupButtons").style.display = "none";
  document.getElementById("questionSection").style.display = "block";
  currentQuestion = 0;
  showQuestion();
}

function showQuestion(){
  const qElem = document.getElementById("questionText");
  qElem.innerHTML = questions[currentQuestion];
  qElem.classList.add("show");
  setTimeout(()=>qElem.classList.remove("show"),300);
}

function showOverlay(){
  const overlay = document.getElementById("overlay");
  overlay.style.display="flex";
  setTimeout(()=>overlay.style.display="none",1000);
}

function submitAnswer(answer){
  if(!selectedGroup){ alert("먼저 그룹을 선택해주세요!"); return; }
  showOverlay();
  fetch(sheetURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({date:today, group:selectedGroup, answer:answer})
  })
  .then(res=>res.text())
  .then(msg=>{
    console.log(msg);
    lastAnswer={answer};
    currentQuestion++;
    if(currentQuestion<questions.length){
      showQuestion();
    }else{
      document.getElementById("questionSection").style.display="none";
    }
  })
  .catch(console.error);
}

function cancelAnswer(){
  if(!lastAnswer){ alert("취소할 응답이 없습니다!"); return; }
  fetch(sheetURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mode:"delete", date:today, group:selectedGroup, answer:lastAnswer.answer})
  })
  .then(res=>res.text())
  .then(msg=>{
    console.log(msg);
    lastAnswer=null;
    currentQuestion=Math.max(0,currentQuestion-1);
    showQuestion();
    document.getElementById("questionSection").style.display="block";
  })
  .catch(console.error);
}

function requestPassword(){
  const pwd = prompt("관리자 비밀번호를 입력하세요:");
  if(pwd==="0705"){
    document.getElementById("statsTable").style.display="block";
    updateCountsFromSheet();
  }else{ alert("비밀번호가 틀렸습니다."); }
}

function updateCountsFromSheet(){
  fetch(sheetURL)
  .then(res=>res.json())
  .then(data=>{
    const daily={"O":0,"△":0,"X":0};
    const monthly={"O":0,"△":0,"X":0};
    const monthKey=today.slice(0,7);
    data.forEach(row=>{
      const [date, group, answer]=row;
      if(group===selectedGroup){
        if(date===today) daily[answer]++;
        if(date.startsWith(monthKey)) monthly[answer]++;
      }
    });
    drawStatsTable(daily, monthly);
  })
  .catch(console.error);
}

function drawStatsTable(daily, monthly){
  const totalMonthly = Object.values(monthly).reduce((a,b)=>a+b,0)||1;
  const makeTable = (title,data,total)=>`
    <h3>${title}</h3>
    <table>
      <tr><th>응답</th><th>개수</th><th>백분율</th></tr>
      <tr><td>O</td><td>${data["O"]}</td><td>${(data["O"]/total*100).toFixed(1)}%</td></tr>
      <tr><td>△</td><td>${data["△"]}</td><td>${(data["△"]/total*100).toFixed(1)}%</td></tr>
      <tr><td>X</td><td>${data["X"]}</td><td>${(data["X"]/total*100).toFixed(1)}%</td></tr>
      <tr><th>총합</th><th>${total}</th><th>100%</th></tr>
    </table>
  `;
  document.getElementById("statsContent").innerHTML = makeTable(`월별 누적 통계 (${today.slice(0,7)})`, monthly, totalMonthly);
}
</script>

</body>
</html>
