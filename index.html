<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세종시안전체험교육원 만족도 조사</title>

<style>

body{
font-family:"Noto Sans KR",sans-serif;
background:#fffdf7;
text-align:center;
padding:20px;
margin:0;
}

/* 제목 */

h1{
color:#ff6f00;
font-size:60px;
margin-bottom:40px;
}

/* 그룹 질문 */

#group h2{
font-size:50px;
margin-bottom:40px;
}

/* 그룹 버튼 */

.groupBtn{
font-size:40px;
padding:30px 60px;
margin:30px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* 유치원 */

.kinder{
background:#ffd54f;
color:black;
}

/* 초등 */

.elementary{
background:#42a5f5;
color:black;
}

/* 질문 */

.question{
font-size:50px;
margin-top:40px;
line-height:1.4;
}

/* 응답 버튼 */

.answers{
margin-top:60px;
}

.answers button{
width:220px;
height:220px;
font-size:90px;
border-radius:50%;
border:none;
margin:30px;
color:white;
cursor:pointer;
}

/* 색 */

.green{background:#66bb6a;}
.yellow{background:#ffee58;color:black;}
.red{background:#ef5350;}

/* 감사 화면 */

#thanks{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
font-weight:bold;
display:none;
z-index:999;
}

</style>

</head>

<body>

<div id="thanks">
응답 감사합니다!
</div>

<h1>안전체험교육 만족도 조사</h1>

<div id="group">

<h2>나는 어떤 친구일까요?</h2>

<button class="groupBtn kinder" onclick="selectGroup('유아')">
유치원 / 어린이집
</button>

<button class="groupBtn elementary" onclick="selectGroup('초등')">
초등학교 저학년
</button>

</div>

<div id="survey" style="display:none">

<div class="question">

교육을 통해 위험한 상황에서<br>
어떻게 행동해야 하는지<br>
잘 알게 되었나요?

</div>

<div class="answers">

<button class="green" onclick="send('O')">O</button>
<button class="yellow" onclick="send('△')">△</button>
<button class="red" onclick="send('X')">X</button>

</div>

</div>

<script>

const sheetURL =
"https://script.google.com/macros/s/AKfycbx6_QNmNP3WMFBsmvd9YFmy_rP34YGyNeLUxAX-MURDD1BZ7n-Wh0FZxaOWm94jVwvn/exec";

let group="";
let lock=false;

function selectGroup(g){

group=g;

document.getElementById("group").style.display="none";
document.getElementById("survey").style.display="block";

}

function send(answer){

if(lock) return;

lock=true;

/* 날짜 생성 (연월일만) */

const today = new Date().toISOString().split("T")[0];

/* 버튼 숨기기 */

document.getElementById("survey").style.display="none";

/* 감사 화면 표시 */

document.getElementById("thanks").style.display="flex";

/* 모든 버튼 비활성화 */

document.querySelectorAll("button").forEach(b=>b.disabled=true);

/* 구글 시트 전송 */

fetch(sheetURL,{
method:"POST",
body:JSON.stringify({
date:today,
group:group,
answer:answer
})
});

/* 1.5초 후 초기화 */

setTimeout(()=>{

location.reload();

},1500);

}

</script>

</body>
</html>
